version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  api-gateway:
    build: ./api-gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - redis

  like-service:
    build: ./like-service
    ports:
      - "8082:8082"

  comment-service:
    build: ./comment-service
    ports:
      - "8083:8083"

  share-service:
    build: ./share-service
    ports:
      - "8084:8084"
